name: Java CI/CD với Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Biên dịch dự án (Build)
        # Dự án của bạn sử dụng Java 17 và JavaFX
        run: mvn -B package --file auction-system/pom.xml

      - name: Kiểm tra file TestCI
        # Chạy file TestCI.java bạn đã tạo
        run: mvn exec:java -Dexec.mainClass="TestCI" -f auction-system/pom.xml

      - name: Lưu trữ sản phẩm (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: auction-system-build
          path: auction-system/target/*.jar